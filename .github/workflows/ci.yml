name: CI — Spam Detector

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check app syntax
        run: |
          python -m py_compile app.py
          echo "✅ app.py syntax OK"

      - name: Check pipeline syntax
        run: |
          python -m py_compile src/pipeline/predict_pipeline.py
          echo "✅ pipeline syntax OK"